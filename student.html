  <style>
    body {
      box-sizing: border-box;
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);

    }
    .category-badge {
      transition: all 0.2s ease;
    }
    .category-badge:hover {
      transform: scale(1.05);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .decorative-bg {
      position: relative;
      background: linear-gradient(135deg, #f0f4ff 0%, #fff9e6 100%);
    }
    .decorative-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(36, 72, 235, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(250, 204, 21, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(36, 72, 235, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .decorative-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(45deg, rgba(36, 72, 235, 0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(250, 204, 21, 0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(36, 72, 235, 0.03) 75%),

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCmDBt1LJLWUEljGQVjYcaJ5FJRm9pcM_k",
      authDomain: "wedappis.firebaseapp.com",
      // databaseURL removed – Firestore only
      projectId: "wedappis",
      storageBucket: "wedappis.firebasestorage.app",
      messagingSenderId: "838403173250",
      appId: "1:838403173250:web:1f5fc5786c6c1104c4bd9b",
      measurementId: "G-F73HSEZBBW"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    // using Firestore for data operations
    const db = firebase.firestore();

    let currentUser = null;
    let clubs = [];
    let registrations = [];
    let currentCategory = 'all';
    let searchQuery = '';

    // Category colors
    const categoryColors = {
      'คณิต': 'from-orange-500 to-orange-600',
      'วิทย์': 'from-green-500 to-green-600',
      'ภาษา': 'from-red-500 to-red-600',
      'สังคม': 'from-yellow-500 to-yellow-600',
      'พละ': 'from-teal-500 to-teal-600',
      'ศิลปะ&ดนตรี': 'from-pink-500 to-pink-600',
      'อื่นๆ': 'from-purple-500 to-purple-600'
    };

    // Initialize
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const sid = user.email ? user.email.split('@')[0] : null;
      db.collection('users').doc(sid).get().then((snap) => {
        const userData = snap.exists ? snap.data() : null;
        if (!userData || userData.role !== 'student') {
          window.location.href = 'index.html';
          return;
        }
        currentUser = { uid: user.uid, studentId: sid, ...userData };
        loadClubs();
        updateUserUI();
      });
    });

    function loadClubs() {
      // Firestore realtime listeners
      db.collection('clubs').onSnapshot((snap) => {
        clubs = [];
        snap.forEach((doc) => {
          clubs.push({ __backendId: doc.id, id: doc.id, ...doc.data() });
        });
        renderClubs();
      });

      // Load settings document (assumed under "settings/system")
      db.collection('settings').doc('system').onSnapshot((doc) => {
        const oldSettings = window.__settings || {};
        window.__settings = doc.exists ? doc.data() : {};
        const newSettings = window.__settings;

        // If system was just closed, close the club modal
        if (!oldSettings.system_closed && newSettings.system_closed) {
          closeClubModal();
          showToast('ระบบสมัครชุมนุมปิดแล้ว ไม่สามารถสมัครหรือยกเลิกได้');
        }

        // If system was just opened (was closed before), show notification and update UI
        if (oldSettings.system_closed && !newSettings.system_closed) {
          showToast('ระบบเปิดแล้ว สามารถสมัครและยกเลิกการสมัครได้');
          renderClubs(); // Re-render to show updated button states
          updateRegisterButtons(); // Update button states
        }

        updateAnnouncementUI();
        renderClubs();
        startRegistrationCountdown();
      });

      db.collection('registrations').onSnapshot((snap) => {
        registrations = [];
        snap.forEach((doc) => {
          registrations.push({ id: doc.id, ...doc.data() });
        });
        renderClubs();
        updateProfileClubInfo();
      });
    }

    function getClubMemberCount(clubId) {
      return registrations.filter(r => r.club_id === clubId).length;
    }

        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[s];

    // Update register buttons enable/disable based on registration window
    function updateRegisterButtons() {
      const settings = window.__settings || {};
      const now = Date.now();
      const regOpen = settings.registration_open || null;
      const regClose = settings.registration_close || null;
      const systemClosed = settings.system_closed || false;

      document.querySelectorAll('[id^="register-btn-"]').forEach(btn => {
        let shouldDisable = systemClosed;

        // Only check registration window if system is NOT closed
        if (!systemClosed) {
          if (regOpen && now < regOpen) {
            shouldDisable = true;
          }
          if (regClose && now > regClose) {
            shouldDisable = true;
          }
        }

        if (shouldDisable) {
          btn.disabled = true;
          btn.setAttribute('aria-disabled', 'true');
          btn.style.pointerEvents = 'none';
          btn.style.opacity = '0.5';
          if (systemClosed) btn.title = 'ระบบปิดแล้ว';
          else if (regOpen && now < regOpen) btn.title = 'ยังไม่เปิดรับสมัคร';
          else if (regClose && now > regClose) btn.title = 'ปิดรับสมัคร';
        } else {
          btn.disabled = false;
          btn.removeAttribute('aria-disabled');
          btn.style.pointerEvents = 'auto';
          btn.style.opacity = '1';
          btn.title = '';
        }
      });

      // Also disable cancel buttons when system is closed
      document.querySelectorAll('[id^="cancel-btn-"]').forEach(btn => {
        if (systemClosed) {
          btn.disabled = true;
          btn.setAttribute('aria-disabled', 'true');
          btn.title = 'ระบบปิดแล้ว ไม่สามารถยกเลิกได้';
          btn.style.opacity = '0.5';
          btn.style.cursor = 'not-allowed';
          btn.style.pointerEvents = 'none';
          btn.onclick = (e) => { e.preventDefault(); showToast('ระบบปิดแล้ว ไม่สามารถยกเลิกได้'); return false; };
        } else {
          btn.disabled = false;
          btn.removeAttribute('aria-disabled');
          btn.title = '';
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
          btn.style.pointerEvents = 'auto';
          // Reset onclick to original
          const clubId = btn.id.replace('cancel-btn-', '');
          btn.onclick = () => cancelRegistration(clubId);
        }
      });
    }

    // Registration countdown UI
    let __registrationCountdownInterval = null;
    let __alertTimers = {}; // Track alerts to avoid duplicates
    
    function startRegistrationCountdown() {
      if (__registrationCountdownInterval) clearInterval(__registrationCountdownInterval);
      updateRegistrationCountdown();
      __registrationCountdownInterval = setInterval(updateRegistrationCountdown, 1000);
    }

    function updateRegistrationCountdown() {
      const el = document.getElementById('registration-countdown');
      const txt = document.getElementById('registration-countdown-text');
      if (!el || !txt) return;
      const settings = window.__settings || {};
      const now = Date.now();
      const regOpen = settings.registration_open || null;
      const regClose = settings.registration_close || null;
      const systemClosed = settings.system_closed || false;

      const dtOpts = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      
      // Auto-close: if registration_close time has passed, close the system
      if (regClose && now >= regClose && !systemClosed) {
        if (!__alertTimers['auto_close']) {
          __alertTimers['auto_close'] = true;
          closeClubModal();
          showToast('🔒 การรับสมัครปิดแล้ว ระบบจะปิดโดยอัตโนมัติ');
          // Auto-set system_closed flag in Firestore when close time is reached
          db.collection('settings').doc('system').update({ system_closed: true }).catch(e => console.error('Error closing system:', e));
        }
      } else {
        __alertTimers['auto_close'] = false;
      }

      // Alert 5 minutes before closing
      if (regClose && now < regClose && (regClose - now < 5 * 60 * 1000) && (regClose - now > 60 * 1000)) {
        if (!__alertTimers['5min_warning']) {
          __alertTimers['5min_warning'] = true;
          const remaining = Math.ceil((regClose - now) / 60000);
          showToast(`⚠️ บอกเลิก: การรับสมัครจะปิดในอีก ${remaining} นาที`);
        }
      } else {
        __alertTimers['5min_warning'] = false;
      }

      // Alert 1 minute before closing
      if (regClose && now < regClose && (regClose - now < 60 * 1000)) {
        if (!__alertTimers['1min_warning']) {
          __alertTimers['1min_warning'] = true;
          showToast('🚨 เร่งด่วน: การรับสมัครจะปิดในอีก 1 นาที');
        }
      } else {
        __alertTimers['1min_warning'] = false;
      }

      // Check if system is closed first
      if (systemClosed) {
        txt.textContent = `🔒 ระบบสมัครชุมนุมปิดแล้ว - นักเรียนไม่สามารถสมัครหรือยกเลิกได้`;
        el.classList.remove('hidden');
      } else if (regOpen && now < regOpen) {
        const diff = regOpen - now;
        const openStr = new Date(regOpen).toLocaleString('th-TH', dtOpts);
        txt.textContent = `⏳ การรับสมัครจะเริ่มใน ${formatDuration(diff)} (เปิด: ${openStr})`;
        el.classList.remove('hidden');
      } else if (regClose && now < regClose && (!regOpen || now >= regOpen)) {
        const diff = regClose - now;
        const closeStr = new Date(regClose).toLocaleString('th-TH', dtOpts);
        txt.textContent = `🟢 รับสมัครกำลังเปิด — ปิดใน ${formatDuration(diff)} (ปิด: ${closeStr})`;
        el.classList.remove('hidden');
      } else if (regClose && now >= regClose) {
        const closeStr = new Date(regClose).toLocaleString('th-TH', dtOpts);
        txt.textContent = `🔒 การรับสมัครปิดแล้ว (ปิด: ${closeStr})`;
        el.classList.remove('hidden');
      } else if (regOpen && !regClose) {
        const openStr = new Date(regOpen).toLocaleString('th-TH', dtOpts);
        txt.textContent = `⏳ การรับสมัครจะเริ่มใน ${formatDuration(regOpen - now)} (เปิด: ${openStr})`;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }

      // Also update register buttons state
      updateRegisterButtons();
    }

    function formatDuration(ms) {
      if (ms <= 0) return '0 วินาที';
      const s = Math.floor(ms / 1000);
      const days = Math.floor(s / 86400);
      const hours = Math.floor((s % 86400) / 3600);
      const minutes = Math.floor((s % 3600) / 60);
      const seconds = s % 60;
      if (days > 0) return `${days} วัน ${hours} ชม.`;
      if (hours > 0) return `${hours} ชม. ${minutes} นาที`;
      if (minutes > 0) return `${minutes} นาที ${seconds} วินาที`;
      return `${seconds} วินาที`;
    }

    async function changePassword() {
      const oldPass = document.getElementById('old-password').value;
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (!oldPass || !newPass || !confirmPass) {
        showToast('กรุณากรอกข้อมูลให้ครบถ้วน');
        return;
      }

      if (newPass !== confirmPass) {
        showToast('รหัสผ่านใหม่ไม่ตรงกัน');
        return;
      }

      if (newPass.length < 6) {
        showToast('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
        return;
      }

      try {
        // Re-authenticate first
        const credential = firebase.auth.EmailAuthProvider.credential(
          auth.currentUser.email,
          oldPass
        );
        
        await auth.currentUser.reauthenticateWithCredential(credential);
        
        // Update password
        await auth.currentUser.updatePassword(newPass);
        
        showToast('เปลี่ยนรหัสผ่านสำเร็จ!');
        document.getElementById('old-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
      } catch (err) {
        if (err.code === 'auth/wrong-password') {
          showToast('รหัสผ่านเก่าไม่ถูกต้อง');
        } else if (err.code === 'auth/weak-password') {
          showToast('รหัสผ่านใหม่อ่อนเกินไป');
        } else {
          showToast('เกิดข้อผิดพลาด: ' + err.message);
        }
      }
    }

    // Compress image file using canvas and return a dataURL
    function compressImage(file, maxWidth = 800, maxHeight = 800, initialQuality = 0.92) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('read_error'));
        reader.onload = (e) => {
          const img = new Image();
          img.onerror = () => reject(new Error('image_error'));
          img.onload = () => {
            let { width, height } = img;
            // Calculate new size while preserving aspect ratio
            if (width > maxWidth || height > maxHeight) {
              const ratio = Math.min(maxWidth / width, maxHeight / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // Try iterative compression to target <= 2MB
            let quality = initialQuality;
            function toData(qual) {
              try {
                const dataURL = canvas.toDataURL('image/jpeg', qual);
                return dataURL;
              } catch (err) {
                return null;
              }
            }

            let dataURL = toData(quality);
            // If initial conversion failed, reject
            if (!dataURL) return reject(new Error('compress_error'));

            // Helper to compute approx bytes from base64
            function dataURLSizeBytes(d) {
              const base64 = d.split(',')[1] || '';
              return Math.round(base64.length * 3 / 4);
            }

            const MAX_BYTES = 2 * 1024 * 1024; // 2MB
            while (dataURLSizeBytes(dataURL) > MAX_BYTES && quality > 0.45) {
              quality -= 0.07;
              dataURL = toData(quality);
              if (!dataURL) break;
            }

            resolve(dataURL);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function changeProfilePicture() {
      const file = document.getElementById('avatar-input').files[0];
      if (!file) return;

      if (!file.type || !file.type.startsWith('image/')) {
        showToast('กรุณาเลือกไฟล์รูปภาพหรือ GIF เท่านั้น');
        return;
      }

      // If GIF, avoid lossy compression (animated gifs would lose animation). Only accept small GIFs.
      if (file.type === 'image/gif') {
        if (file.size > 2 * 1024 * 1024) {
          showToast('ไฟล์ GIF มีขนาดใหญ่เกินไป โปรดลองไฟล์ขนาดเล็กหรือใช้ภาพ JPG/PNG');
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          const dataURL = e.target.result;
          const img = document.getElementById('profile-avatar-img');
          const text = document.getElementById('profile-avatar-text');
          img.src = dataURL;
          img.style.display = 'block';
          text.style.display = 'none';

          db.collection('users').doc(currentUser.studentId).update({ avatar: dataURL })
            .then(() => {
              currentUser.avatar = dataURL;
              const headerImg = document.getElementById('user-avatar-img');
              const headerText = document.getElementById('user-avatar-text');
              if (headerImg) {
                headerImg.src = dataURL;
                headerImg.style.display = 'block';
              }
              if (headerText) headerText.style.display = 'none';
              showToast('บันทึกรูปภาพสำเร็จ!');
            })
            .catch(() => showToast('เกิดข้อผิดพลาด'));
        };
        reader.readAsDataURL(file);
        return;
      }

      // For other image types, run compression
      try {
        showToast('กำลังบีบอัดรูปภาพ...');
        const compressedDataURL = await compressImage(file, 800, 800, 0.92);

        // Validate compressed size
        const base64 = compressedDataURL.split(',')[1] || '';
        const byteSize = Math.round(base64.length * 3 / 4);
        if (byteSize > 2 * 1024 * 1024) {
          showToast('ยังบีบอัดไฟล์ไม่พอ โปรดลองเลือกรูปภาพขนาดเล็กลง');
          return;
        }

        // Update UI with compressed image
        const img = document.getElementById('profile-avatar-img');
        const text = document.getElementById('profile-avatar-text');
        img.src = compressedDataURL;
        img.style.display = 'block';
        text.style.display = 'none';

        // Save compressed to Firebase
        await db.collection('users').doc(currentUser.studentId).update({ avatar: compressedDataURL });
        currentUser.avatar = compressedDataURL;
        const headerImg = document.getElementById('user-avatar-img');
        const headerText = document.getElementById('user-avatar-text');
        if (headerImg) {
          headerImg.src = compressedDataURL;
          headerImg.style.display = 'block';
        }
        if (headerText) headerText.style.display = 'none';
        showToast('บันทึกรูปภาพสำเร็จ!');
      } catch (err) {
        console.error(err);
        showToast('ไม่สามารถบีบอัดรูปภาพได้');
      }
    }

    async function registerClub(clubId) {
      if (!currentUser) return;

      const settings = window.__settings || {};
      const now = Date.now();

      // Check if system is closed first - if closed, no registration allowed
      if (settings.system_closed) {
        showToast('ระบบสมัครชุมนุมปิดแล้ว ติดต่อครูที่ปรึกษาหากมีข้อสงสัย');
        return;
      }

      // Only check registration window if system is OPEN
      if (settings.registration_open && now < settings.registration_open) {
        showToast('ยังไม่ถึงเวลารับสมัคร');
        return;
      }
      if (settings.registration_close && now > settings.registration_close) {
        showToast('ปิดรับสมัครแล้ว');
        return;
      }

      // Prevent multiple registrations: allow only one club per student
      const existing = getStudentRegistration(currentUser.studentId);
      if (existing) {
        if (existing.club_id === clubId) {
          showToast('คุณสมัครชุมนุมนี้แล้ว');
        } else {
          showToast('คุณได้สมัครชุมนุมอื่นแล้ว หากต้องการสมัครใหม่ กรุณายกเลิกการสมัครก่อน');
        }
        return;
      }

      const btn = document.getElementById(`register-btn-${clubId}`);
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'กำลังสมัคร...';
      }

      try {
        await db.collection('registrations').add({
          type: 'registration',
          student_id: currentUser.studentId,
          student_name: `${currentUser.title ? currentUser.title + ' ' : ''}${currentUser.firstname || ''} ${currentUser.lastname || ''}`,
          student_class: `${currentUser.level}/${currentUser.room}`,
          club_id: clubId,
          registered_at: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('สมัครสำเร็จ!');
        closeClubModal();
      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'สมัครชุมนุมนี้';
        }
        showToast('เกิดข้อผิดพลาด');
      }
    }

    async function cancelRegistration(clubId) {
      if (!currentUser) return;

      // Check if system is closed - STRICT CHECK
      const settings = window.__settings || {};
      if (settings.system_closed) {
        showToast('ระบบปิดแล้ว ไม่สามารถทำการยกเลิกได้');
        return;
      }

      const btn = document.getElementById(`cancel-btn-${clubId}`);
      
      // Double check: if button is disabled, don't proceed
      if (btn && (btn.disabled || btn.getAttribute('aria-disabled') === 'true')) {
        showToast('ระบบปิดแล้ว ไม่สามารถทำการยกเลิกได้');
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.textContent = 'กำลังยกเลิก...';
      }

      try {
        const reg = registrations.find(r => r.student_id === currentUser.studentId && r.club_id === clubId);
        if (reg && reg.id) {
          await db.collection('registrations').doc(reg.id).delete();
        }
        showToast('ยกเลิกแล้ว');
        closeClubModal();
      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'ยกเลิกการสมัคร';
        }
        showToast('เกิดข้อผิดพลาด');
      }
    }

    function logout() {
      Swal.fire({
        icon: 'question',
        title: 'ออกจากระบบ',
        text: 'คุณต้องการออกจากระบบหรือไม่?',
        showCancelButton: true,
        confirmButtonText: 'ออก',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#6366f1',
        didOpen: () => {
          Swal.hideLoading();
        }
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.close();
          auth.signOut().then(() => {
            window.location.href = 'index.html';
          });
        }
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>

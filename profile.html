<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>โปรไฟล์สมาชิก</title>
  <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; font-family: 'Itim', cursive;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .container {
      background: #fff; padding: 30px 40px; border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      max-width: 460px; width: 100%;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 24px; }

    /* --- Profile --- */
    .profile-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 15px;
    }
    .profile-pic {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #2196F3;
      transition: 0.3s;
    }
    .profile-placeholder {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 14px;
      padding: 4px 0;
      border-radius: 0 0 50% 50%;
      cursor: pointer;
    }

    input[type="file"], input[type="password"] { 
      display: inline-block; width:100%; padding:8px; 
      margin-bottom:8px; border-radius:6px; border:1px solid #ccc; 
    }

    .info { text-align:left; margin-bottom: 20px; }
    .info p { margin: 8px 0; font-size: 16px; color:#444; }

    button {
      padding: 12px 18px; border: none; border-radius: 10px;
      background: #f44336; color: white; font-size: 16px; cursor: pointer;
      margin: 5px;
      transition: 0.3s;
    }
    button:hover { opacity: 0.85; }

    #changePasswordBtn { background:#4CAF50; }
    #msg { margin-top:10px; font-size:14px; text-align:center; }

    .change-password {
      margin-top: 15px; text-align:left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>โปรไฟล์สมาชิก</h1>

    <!-- Profile Picture -->
    <div class="profile-container">
      <img id="profilePic" src="https://via.placeholder.com/120" alt="Profile Picture" class="profile-pic">
      <label class="profile-placeholder" for="profileUpload">
        คลิกเพื่อเปลี่ยนรูป
      </label>
    </div>
    <input type="file" id="profileUpload" accept="image/*" style="display:none;" />
    

    <div class="info" id="profileInfo">
      <p>กำลังโหลดข้อมูล...</p>
    </div>

    <!-- เปลี่ยนรหัสผ่าน -->
    <div class="change-password">
      <p><strong>เปลี่ยนรหัสผ่าน</strong></p>
      <input type="password" id="oldPassword" placeholder="รหัสผ่านเก่า">
      <input type="password" id="newPassword" placeholder="รหัสผ่านใหม่">
      <input type="password" id="confirmPassword" placeholder="ยืนยันรหัสผ่านใหม่">
      <button id="changePasswordBtn">ยืนยันเปลี่ยนรหัสผ่าน</button>
    </div>

    <button id="logoutBtn">ออกจากระบบ</button>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCmDBt1LJLWUEljGQVjYcaJ5FJRm9pcM_k",
      authDomain: "wedappis.firebaseapp.com",
      databaseURL: "https://wedappis-default-rtdb.firebaseio.com",
      projectId: "wedappis",
      storageBucket: "wedappis.appspot.com",
      messagingSenderId: "838403173250",
      appId: "1:838403173250:web:1f5fc5786c6c1104c4bd9b",
      measurementId: "G-F73HSEZBBW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const profileInfo = document.getElementById("profileInfo");
    const profilePic = document.getElementById("profilePic");
    const profileUpload = document.getElementById("profileUpload");
    const logoutBtn = document.getElementById("logoutBtn");
    const msg = document.getElementById("msg");

    const oldPasswordInput = document.getElementById("oldPassword");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const changePasswordBtn = document.getElementById("changePasswordBtn");

    let currentUserId = null;

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserId = user.uid;
        const userDoc = await getDoc(doc(db, "users", currentUserId));
        if (userDoc.exists()) {
          const data = userDoc.data();
          profileInfo.innerHTML = `
            <p><strong>ชื่อ-นามสกุล:</strong> ${data.fullname}</p>
            <p><strong>เลขประจำตัวนักเรียน:</strong> ${data.idnumber}</p>
            <p><strong>Email:</strong> ${data.email}</p>
            <p><strong>สถานะ:</strong> ${data.memberType}</p>
          `;
          profilePic.src = data.photoURL || "https://via.placeholder.com/120";
        } else {
          profileInfo.innerHTML = "<p>ไม่พบข้อมูลผู้ใช้</p>";
        }
      } else {
        window.location.href = "index.html";
      }
    });

    // เปลี่ยนรูปทันที
    profileUpload.addEventListener("change", async () => {
      const file = profileUpload.files[0];
      if (!file) return;

      msg.style.color = "#d32f2f";
      msg.textContent = "";

      try {
        const base64Img = await fileToBase64(file);
        await updateDoc(doc(db, "users", currentUserId), { photoURL: base64Img });
        profilePic.src = base64Img;
        msg.style.color = "#388e3c";
        msg.textContent = "อัปโหลดรูปโปรไฟล์สำเร็จ!";
      } catch (error) {
        msg.textContent = "เกิดข้อผิดพลาด: " + error.message;
      }
    });

    // เปลี่ยนรหัสผ่าน (ตรวจสอบยืนยันรหัส)
    changePasswordBtn.addEventListener("click", async () => {
      const oldPassword = oldPasswordInput.value.trim();
      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!oldPassword || !newPassword || !confirmPassword) {
        msg.style.color = "#d32f2f";
        msg.textContent = "กรุณากรอกรหัสผ่านให้ครบทุกช่อง";
        return;
      }

      if (newPassword !== confirmPassword) {
        msg.style.color = "#d32f2f";
        msg.textContent = "รหัสผ่านใหม่กับยืนยันรหัสผ่านไม่ตรงกัน";
        return;
      }

      try {
        const user = auth.currentUser;
        const credential = EmailAuthProvider.credential(user.email, oldPassword);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, newPassword);
        msg.style.color = "#388e3c";
        msg.textContent = "เปลี่ยนรหัสผ่านสำเร็จ!";
        oldPasswordInput.value = "";
        newPasswordInput.value = "";
        confirmPasswordInput.value = "";
      } catch (error) {
        msg.style.color = "#d32f2f";
        msg.textContent = "เกิดข้อผิดพลาด: " + error.message;
      }
    });

    // ออกจากระบบ
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
